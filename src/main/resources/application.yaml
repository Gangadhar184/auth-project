server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: auth-project

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_projectt
    username: postgres
    password: root123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_insert: true
        order_updates: true
    show-sql: false
data:
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 10
        max-idle: 5
        min-idle: 2
mail:
  host: smtp.gmail.com
  port: ${SMTP_PORT:587}
  username: ${SMTP_USER}
  password: ${SMTP_PASS}
  protocol: smtp
  tls: true
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

jackson:
  serialization:
    write-dates-as-timestamps: false
  default-property-inclusion: non_null


app:
  security:
    jwt:
      access-token-expiration: ${JWT_ACCESS_EXP:900000}
      refresh-token-expiration: ${JWT_REFRESH_EXP:604800000}
      key-store-path: ${JWT_KEYSTORE_PATH}
      key-store-password: ${JWT_KEYSTORE_PASSWORD}
      key-alias: ${JWT_KEY_ALIAS:auth-key}
      kid: ${JWT_KID:v1}
    argon2:
      memory: 65536
      iterations: 3
      parallelism: 4
      salt-length: 16
      hash-length: 32
    rate-limiting:
      login-max-attempts: 5
      login-window-seconds: 300
      password-reset-max: 3
      password-rest-window: 3600
    brute-force:
      max-failures: 5
      lockout-duration-minutes: 30
    verification:
      token-expiry-hours: 24
    password-reset:
      token-expiry-minutes: 30

logging:
  level:
    root: INFO
    com.example.auth_project: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
